name: Initialize Wiki

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap wiki repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          mkdir wiki && cd wiki
          git init
          printf '# bambulab_metrics_exporter\n\nProduction-oriented Prometheus exporter for Bambu Lab printers.\n\nSee sidebar for wiki pages.\n' > Home.md
          git add Home.md
          git commit -m "init: bootstrap wiki"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"
          git push -u origin master
