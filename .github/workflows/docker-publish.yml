name: Docker Publish

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/bambulab_metrics_exporter
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run lint and tests
        run: |
          python -m compileall -q src tests
          ruff check src tests
          pytest -q

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

      - name: Update release notes with image info
        uses: actions/github-script@v7
        with:
          script: |
            const release = context.payload.release;
            const image = process.env.IMAGE_NAME;
            const tag = process.env.RELEASE_TAG;
            const block = [
              '## Docker image',
              '',
              `- ${image}:${tag.replace(/^v/, '')}`,
              `- ${image}:latest`,
            ].join('\n');

            const current = release.body || '';
            const next = current.includes('## Docker image')
              ? current.replace(/## Docker image[\s\S]*/m, block)
              : `${current}\n\n${block}`.trim();

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: next,
            });
