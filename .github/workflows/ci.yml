name: CI

on:
  pull_request:
    branches: ["main"]

jobs:
  pr-essential-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Essential checks (PR)
        run: |
          python -m compileall -q src tests
          ruff check src tests
          # Run a fast smoke subset without enforcing global coverage threshold.
          pytest -q --no-cov tests/test_api.py tests/test_config.py tests/test_models.py tests/test_metrics.py
