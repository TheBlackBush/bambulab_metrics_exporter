services:
  bambulab-metrics-exporter:
    build: .
    container_name: bambulab-metrics-exporter
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "9109:9109"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9109/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
