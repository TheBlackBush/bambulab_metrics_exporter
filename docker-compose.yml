services:
  bambulab-metrics-exporter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bambulab-metrics-exporter
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "9109:9109"

    environment:
      # Required for regular cloud run
      BAMBULAB_TRANSPORT: ${BAMBULAB_TRANSPORT:-cloud_mqtt}
      BAMBULAB_SERIAL: ${BAMBULAB_SERIAL}
      BAMBULAB_SECRET_KEY: ${BAMBULAB_SECRET_KEY}
      BAMBULAB_CLOUD_EMAIL: ${BAMBULAB_CLOUD_EMAIL}

      # Optional (uncomment if needed)
      # LISTEN_HOST: ${LISTEN_HOST:-0.0.0.0}
      # LISTEN_PORT: ${LISTEN_PORT:-9109}
      # PUID: ${PUID:-99}
      # PGID: ${PGID:-100}
      # UMASK: ${UMASK:-002}
      # PRINTER_NAME: ${PRINTER_NAME:-bambu}
      # SITE: ${SITE:-}
      # LOCATION: ${LOCATION:-}
      # LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # POLLING_INTERVAL_SECONDS: ${POLLING_INTERVAL_SECONDS:-10}
      # REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-8}
      # RECONNECT_INTERVAL_SECONDS: ${RECONNECT_INTERVAL_SECONDS:-5}
      # BAMBULAB_CONFIG_DIR: ${BAMBULAB_CONFIG_DIR:-/config/bambulab-metrics-exporter}
      # BAMBULAB_CREDENTIALS_FILE: ${BAMBULAB_CREDENTIALS_FILE:-credentials.enc.json}
      # BAMBULAB_CLOUD_CODE: ${BAMBULAB_CLOUD_CODE:-}
      # BAMBULAB_CLOUD_USER_ID: ${BAMBULAB_CLOUD_USER_ID:-}
      # BAMBULAB_CLOUD_ACCESS_TOKEN: ${BAMBULAB_CLOUD_ACCESS_TOKEN:-}
      # BAMBULAB_CLOUD_REFRESH_TOKEN: ${BAMBULAB_CLOUD_REFRESH_TOKEN:-}
      # BAMBULAB_CLOUD_MQTT_HOST: ${BAMBULAB_CLOUD_MQTT_HOST:-us.mqtt.bambulab.com}
      # BAMBULAB_CLOUD_MQTT_PORT: ${BAMBULAB_CLOUD_MQTT_PORT:-8883}
      # BAMBULAB_HOST: ${BAMBULAB_HOST:-}
      # BAMBULAB_PORT: ${BAMBULAB_PORT:-8883}
      # BAMBULAB_USERNAME: ${BAMBULAB_USERNAME:-bblp}
      # BAMBULAB_ACCESS_CODE: ${BAMBULAB_ACCESS_CODE:-}
      # BAMBULAB_REQUEST_PUSHALL: ${BAMBULAB_REQUEST_PUSHALL:-true}

    volumes:
      - ./config:/config/bambulab-metrics-exporter
      - ./.env:/app/.env

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9109/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
