<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bambu Lab Metrics Exporter</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface-hover: #222;
    --border: #2a2a2a;
    --text: #f5f5f5;
    --text-secondary: #888;
    --green: #22c55e;
    --green-dim: rgba(34, 197, 94, 0.12);
    --yellow: #eab308;
    --yellow-dim: rgba(234, 179, 8, 0.12);
    --radius: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 1.75rem;
  }

  /* ─── Header ─────────────────────────────────────────── */
  header {
    text-align: center;
  }

  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    margin-bottom: 0.5rem;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    color: var(--green);
  }

  header h1 {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1.2;
  }

  .version-badge {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text-secondary);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.2rem 0.65rem;
    letter-spacing: 0.02em;
    margin-top: 0.4rem;
  }

  /* ─── Cards ──────────────────────────────────────────── */
  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.25rem 1.1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    transition: border-color 0.2s;
  }

  .card:hover {
    border-color: #3a3a3a;
  }

  .card-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
  }

  .card-status {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  /* ─── Pill badges ─────────────────────────────────────── */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    font-size: 0.82rem;
    font-weight: 500;
    border-radius: 999px;
    padding: 0.28rem 0.7rem 0.28rem 0.5rem;
    width: fit-content;
  }

  .pill-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .pill.green {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(34, 197, 94, 0.25);
  }

  .pill.green .pill-dot {
    background: var(--green);
    animation: pulse-green 2s ease-in-out infinite;
  }

  .pill.yellow {
    background: var(--yellow-dim);
    color: var(--yellow);
    border: 1px solid rgba(234, 179, 8, 0.25);
  }

  .pill.yellow .pill-dot {
    background: var(--yellow);
    animation: pulse-yellow 2s ease-in-out infinite;
  }

  /* CSS class hooks for Python template injection */
  .pill.ready {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(34, 197, 94, 0.25);
  }

  .pill.ready .pill-dot {
    background: var(--green);
    animation: pulse-green 2s ease-in-out infinite;
  }

  .pill.warming {
    background: var(--yellow-dim);
    color: var(--yellow);
    border: 1px solid rgba(234, 179, 8, 0.25);
  }

  .pill.warming .pill-dot {
    background: var(--yellow);
    animation: pulse-yellow 2s ease-in-out infinite;
  }

  .pill.healthy {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(34, 197, 94, 0.25);
  }

  .pill.healthy .pill-dot {
    background: var(--green);
    animation: pulse-green 2s ease-in-out infinite;
  }

  .pill.unhealthy {
    background: rgba(239, 68, 68, 0.12);
    color: #ef4444;
    border: 1px solid rgba(239, 68, 68, 0.25);
  }

  .pill.unhealthy .pill-dot {
    background: #ef4444;
    animation: pulse-red 2s ease-in-out infinite;
  }

  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
    50%       { box-shadow: 0 0 0 4px rgba(239, 68, 68, 0); }
  }

  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); }
    50%       { box-shadow: 0 0 0 4px rgba(34, 197, 94, 0); }
  }

  @keyframes pulse-yellow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.5); }
    50%       { box-shadow: 0 0 0 4px rgba(234, 179, 8, 0); }
  }

  /* ─── Footer ─────────────────────────────────────────── */
  footer {
    text-align: center;
  }

  .gh-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.45rem 0.9rem;
    background: var(--surface);
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }

  .gh-link:hover {
    color: var(--text);
    border-color: #3a3a3a;
    background: var(--surface-hover);
  }

  .gh-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  /* ─── Responsive ──────────────────────────────────────── */
  @media (max-width: 380px) {
    .cards {
      grid-template-columns: 1fr;
    }

    header h1 {
      font-size: 1.15rem;
    }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-row">
      <!-- Metrics / chart icon -->
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      <h1>Bambu Lab Metrics Exporter</h1>
    </div>
    <span class="version-badge">v{{VERSION}}</span>
  </header>

  <div class="cards">
    <!-- Health card -->
    <div class="card">
      <span class="card-label">Health</span>
      <div class="card-status">
        <span class="pill {{HEALTH_CLASS}}">
          <span class="pill-dot"></span>
          {{HEALTH_STATUS}}
        </span>
      </div>
    </div>

    <!-- Ready card -->
    <div class="card">
      <span class="card-label">Ready</span>
      <div class="card-status">
        <span class="pill {{READY_CLASS}}">
          <span class="pill-dot"></span>
          {{READY_STATUS}}
        </span>
      </div>
    </div>
  </div>

  <footer>
    <a class="gh-link" href="https://github.com/TheBlackBush/bambulab_metrics_exporter" target="_blank" rel="noopener noreferrer">
      <!-- GitHub mark SVG (official, inline) -->
      <svg class="gh-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      GitHub
    </a>
  </footer>

</div>
</body>
</html>
